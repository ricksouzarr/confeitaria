spring.application.name=confeitaria
server.error.include-message=always

# =========================================================
# ? CONFIG ORIGINAL (POSTGRES + DOCKER)
# =========================================================
Usado quando roda com Docker (host "postgres")
spring.datasource.url=jdbc:postgresql://postgres:5432/confeitaria
spring.datasource.username=admin
spring.datasource.password=admin

# =========================================================
# ? CONFIG TEMPOR¡RIA (H2 EM MEM”RIA)
# =========================================================
